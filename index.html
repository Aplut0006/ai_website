<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome to Bawasir AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="center">
    <div style="text-align:center">
      <h1>welcome to Bawasir <span class="flag"><span>A</span><span>I</span></span></h1>
      <button id="open-criz" class="btn">Open Cricbuzz</button>
      <div id="weather-panel" class="weather-panel">
        <div class="weather-card" id="pune-card">
          <strong>Pune</strong>
          <div class="weather-status">Loading weather…</div>
        </div>
        <div class="weather-card" id="bokaro-card">
          <strong>Bokaro Steel City</strong>
          <div class="weather-status">Loading weather…</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('open-criz').addEventListener('click', function () {
      window.open('https://cricbuzz.com', '_blank', 'noopener');
    });

    const cities = [
      {id: 'pune-card', name: 'Pune', lat: 18.5204, lon: 73.8567},
      {id: 'bokaro-card', name: 'Bokaro Steel City', lat: 23.6693, lon: 86.1511}
    ];

    function weatherLabel(code) {
      if (code === 0) return 'Clear';
      if (code === 1) return 'Mainly clear';
      if (code === 2) return 'Partly cloudy';
      if (code === 3) return 'Overcast';
      if (code === 45 || code === 48) return 'Fog';
      if (code >= 51 && code <= 67) return 'Drizzle';
      if (code >= 71 && code <= 77) return 'Snow';
      if (code >= 80 && code <= 82) return 'Rain showers';
      if (code >= 85 && code <= 86) return 'Snow showers';
      if (code >= 95 && code <= 99) return 'Thunderstorm';
      return 'Weather data';
    }

    async function fetchWeather(city) {
      const card = document.getElementById(city.id);
      const status = card.querySelector('.weather-status');
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true&timezone=Asia%2FKolkata`;
        const response = await fetch(url);
        if (!response.ok) throw new Error('Network response was not ok');
        const data = await response.json();
        const weather = data.current_weather;
        if (!weather) throw new Error('Weather data not available');

        status.innerHTML = `
          <div class="weather-value">${weather.temperature.toFixed(1)}°C</div>
          <div class="weather-label">${weatherLabel(weather.weathercode)}</div>
          <div class="weather-meta">Wind ${weather.windspeed.toFixed(0)} km/h · ${weather.winddirection.toFixed(0)}°</div>
        `;
      } catch (error) {
        status.textContent = 'Unable to load weather';
        status.classList.add('weather-error');
      }
    }

    cities.forEach(fetchWeather);
  </script>
</body>
</html>
